<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#1A1A2E"/>
  <g transform="translate(256,280)">
    <!-- Speedometer arc -->
    <path d="M-160,-40 A 170 170 0 0 1 160,-40" fill="none" stroke="#FF4500" stroke-width="28" stroke-linecap="round"/>
    <!-- Speed marks -->
    <line x1="-145" y1="-65" x2="-125" y2="-55" stroke="#FFD700" stroke-width="8" stroke-linecap="round"/>
    <line x1="-110" y1="-120" x2="-95" y2="-105" stroke="#FFD700" stroke-width="8" stroke-linecap="round"/>
    <line x1="-50" y1="-155" x2="-42" y2="-135" stroke="#FFD700" stroke-width="8" stroke-linecap="round"/>
    <line x1="50" y1="-155" x2="42" y2="-135" stroke="#FFD700" stroke-width="8" stroke-linecap="round"/>
    <line x1="110" y1="-120" x2="95" y2="-105" stroke="#FFD700" stroke-width="8" stroke-linecap="round"/>
    <line x1="145" y1="-65" x2="125" y2="-55" stroke="#FFD700" stroke-width="8" stroke-linecap="round"/>
    <!-- Needle pointing to high speed -->
    <line x1="0" y1="10" x2="100" y2="-110" stroke="#FF4500" stroke-width="10" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="16" fill="#FFD700"/>
  </g>
  <!-- GL text -->
  <text x="256" y="430" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="88" fill="#FFFFFF" letter-spacing="8">GL</text>
</svg>
